<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환수 원정대 · 대형 스크린</title>
<style>
:root{--bg:#0e1526;--panel:#182238;--line:#2c3b5c;--ink:#eef3fb;--sub:#8fa3c4;--gold:#f2b441;--glow:#7fe3d4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:radial-gradient(ellipse at 50% 0%,#1c2c4a 0%,var(--bg) 60%);color:var(--ink);min-height:100vh;overflow:hidden;}
/* 상단 슬라이딩 티커 */
.ticker{position:fixed;top:0;left:0;right:0;height:58px;background:#0a1120ee;border-bottom:1px solid var(--line);
  display:flex;align-items:center;overflow:hidden;z-index:10;}
.ticker.hide{display:none;}
.ticker .tk{white-space:nowrap;font-size:1.35rem;font-weight:600;will-change:transform;
  animation:marq var(--dur,22s) linear infinite;}
.ticker .tk b{color:var(--gold);}
@keyframes marq{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.mode{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:80px 5vw 5vh;}
.mode.on{display:flex;}
h1{font-size:3rem;font-weight:800;margin-bottom:.6rem;text-shadow:0 0 30px rgba(242,180,65,.35);}
.eyebrow{letter-spacing:.5em;font-size:1rem;color:var(--gold);margin-bottom:1rem;opacity:.85;}
.board{width:min(860px,92vw);}
.brow{display:flex;align-items:center;gap:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px 22px;margin:9px 0;font-size:1.45rem;animation:in .4s ease;}
@keyframes in{from{opacity:0;transform:translateY(8px)}}
.brow .rk{width:74px;font-weight:900;color:var(--gold);font-size:1.6rem;}
.brow:nth-child(1) .rk{font-size:2rem;}
.brow .nm{flex:1;font-weight:700;}
.brow .sc{font-weight:800;color:var(--gold);}
/* 치유의 샘 — 완전 중앙 정렬 */
.heal-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;}
.code{font-family:'Consolas',monospace;font-size:clamp(5rem,14vw,10rem);font-weight:800;letter-spacing:.28em;
  color:#fff;text-shadow:0 0 40px rgba(127,227,212,.6);padding-left:.28em;line-height:1.1;margin-top:1rem;}
.bar{width:min(620px,74vw);height:14px;border-radius:99px;background:#ffffff20;overflow:hidden;margin-top:2rem;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--glow),#3fb8c4);transition:width .2s linear;}
.hint{margin-top:1rem;color:var(--sub);font-size:1.25rem;line-height:1.7;}
.hint b{color:var(--glow);}
.closed{font-size:2rem;color:var(--sub);margin-top:2rem;line-height:1.8;text-align:center;}
</style>
</head>
<body>
<div class="ticker hide" id="ticker"><div class="tk" id="tk"></div></div>

<section class="mode on" id="m-leaderboard">
  <div class="eyebrow">MONSTER EXPEDITION</div>
  <h1>🏆 실시간 순위</h1>
  <div class="board" id="board"></div>
</section>

<section class="mode" id="m-heal">
  <div class="heal-wrap">
    <div class="eyebrow">HEALING SPRING</div>
    <h1>💧 치유의 샘</h1>
    <div id="healBody"></div>
  </div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  /* ★ 동일한 Firebase 설정 붙여넣기 ★ */
  apiKey:"", authDomain:"", databaseURL:"", projectId:"", storageBucket:"", messagingSenderId:"", appId:""
};
const PERIOD = 30; /* 치유 코드 갱신 주기(초) — 수기 입력 시간 고려 */
const $=s=>document.querySelector(s);
if(!FIREBASE_CONFIG.apiKey){document.body.innerHTML='<div style="padding:60px;text-align:center;font-size:1.4rem;">FIREBASE_CONFIG를 파일 상단에 입력하세요</div>';}
else{
firebase.initializeApp(FIREBASE_CONFIG);
const DB=firebase.database();
firebase.auth().signInAnonymously();
let MODE="leaderboard",HEAL_OPEN=false;
DB.ref("screen/mode").on("value",s=>{MODE=s.val()||"leaderboard";applyMode();});
DB.ref("stations/heal/open").on("value",s=>{HEAL_OPEN=!!s.val();renderHealFrame();});
function applyMode(){
  document.querySelectorAll(".mode").forEach(m=>m.classList.remove("on"));
  ($("#m-"+MODE)||$("#m-leaderboard")).classList.add("on");
  if(MODE==="heal")renderHealFrame();
}
/* 리더보드 (성명+직위) */
DB.ref("players").on("value",s=>{
  const P=s.val()||{};
  const rows=Object.values(P).map(p=>({name:(p.name||"?")+(p.title?" "+p.title:""),score:p.score||0}))
    .sort((a,b)=>b.score-a.score).slice(0,10);
  const medal=["🥇","🥈","🥉"];
  $("#board").innerHTML=rows.map((p,i)=>`
    <div class="brow"><div class="rk">${medal[i]||(i+1)+"위"}</div>
    <div class="nm">${p.name}</div><div class="sc">${p.score}점</div></div>`).join("")
    ||'<div style="color:var(--sub);font-size:1.3rem;">참가자를 기다리는 중…</div>';
});
/* 상단 티커: 이벤트 발생 전엔 숨김, 발생하면 슬라이딩 반복 */
let feedQ=[];
DB.ref("feed").limitToLast(6).on("child_added",s=>{
  const v=s.val();if(!v||!v.msg)return;
  feedQ.push(v.msg.replace(/<[^>]+>/g,""));
  if(feedQ.length>6)feedQ.shift();
  renderTicker();
});
function renderTicker(){
  if(!feedQ.length)return;
  const tick=$("#ticker"),tk=$("#tk");
  tick.classList.remove("hide");
  const txt=feedQ.slice().reverse().map(m=>m.startsWith("📣")?`<b>${m}</b>`:m).join("　✦　");
  tk.innerHTML=txt;
  tk.style.setProperty("--dur",Math.max(16,txt.length*0.22)+"s");
  tk.style.animation="none";void tk.offsetWidth;tk.style.animation="";
}
/* 치유 코드 — 이 화면이 생성기: PERIOD초마다 새 코드+타임스탬프 기록 */
let lastWin=-1,curCode=null;
function renderHealFrame(){
  if(MODE!=="heal")return;
  if(!HEAL_OPEN){
    $("#healBody").innerHTML='<div class="closed">⛔ 지금은 닫혀 있습니다<br><small style="font-size:1.2rem;">관리자 콘솔에서 "샘 열기"를 누르면 코드가 표시됩니다</small></div>';
    return;}
  $("#healBody").innerHTML=`
    <div class="code" id="codeTxt">------</div>
    <div class="bar"><i id="barI" style="width:100%"></i></div>
    <div class="hint">기절한 환수를 데려오세요!<br>앱의 치유 탭에 위 <b>6자리 코드</b>를 입력하면 복습 퀴즈가 시작됩니다 (<b id="secT">${PERIOD}</b>초마다 갱신)</div>`;
  lastWin=-1;
}
function tick(){
  if(MODE==="heal"&&HEAL_OPEN&&document.getElementById("codeTxt")){
    const now=Math.floor(Date.now()/1000);
    const win=Math.floor(now/PERIOD);
    const remain=PERIOD-(now%PERIOD);
    if(win!==lastWin){
      lastWin=win;
      const code=String(100000+Math.floor(Math.random()*900000));
      DB.ref("stations/heal").update({prevCode:curCode||null,code,win,ts:Date.now()});
      curCode=code;
      $("#codeTxt").textContent=code;
    }
    $("#barI").style.width=(remain/PERIOD*100)+"%";
    $("#secT").textContent=remain;
  }
  setTimeout(tick,200);
}
tick();
}
</script>
</body>
</html>
